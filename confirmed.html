<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="only light">
    <title>You're confirmed! | Grow Food System</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400;1,9..144,700&display=swap" rel="stylesheet">
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%231f5b39'/%3E%3Cpath d='M19 39c0-12.8 12.1-20.2 26-21-1.4 10.5-8.3 24-26 21Z' fill='%23dfeade'/%3E%3Cpath d='M24 39c3.3-8.4 9.9-14.5 19.6-18.2' stroke='%23f7f7f2' stroke-width='3.2' stroke-linecap='round'/%3E%3C/svg%3E"
    >
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #f7f7f2;
        --accent: #1f5b39;
        --accent-deep: #102d1b;
        --accent-soft: #dfeade;
        --text: #162017;
        --text-soft: #4a5e4d;
        --radius: 28px;
      }

      html { color-scheme: only light; }
      body {
        font-family: "Avenir Next", "Avenir", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .card {
        background: #fff;
        border-radius: var(--radius);
        padding: 3rem 2.5rem;
        max-width: 520px;
        width: 100%;
        text-align: center;
        box-shadow: 0 2px 24px rgba(22, 48, 33, 0.08);
      }

      .icon {
        width: 64px;
        height: 64px;
        background: var(--accent-soft);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.75rem;
        font-size: 1.75rem;
      }

      h1 {
        font-family: Fraunces, Georgia, serif;
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent-deep);
        line-height: 1.2;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1.05rem;
        color: var(--text-soft);
        line-height: 1.65;
        margin-bottom: 1rem;
      }

      p:last-of-type { margin-bottom: 2rem; }

      .btn {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 0.85rem 2rem;
        border-radius: 50px;
        text-decoration: none;
        transition: background 0.15s;
      }

      .btn:hover { background: var(--accent-deep); }

      .footer {
        margin-top: 2rem;
        font-size: 0.82rem;
        color: var(--text-soft);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">&#9989;</div>
      <h1>You're confirmed!</h1>
      <p>Your guide is on its way. Check your inbox for an email from Grow Food System — it should arrive within the next minute.</p>
      <p>If you don't see it, check your spam folder and mark us as safe.</p>
      <a class="btn" href="/">Back to Grow Food System</a>
    </div>
    <p class="footer">&copy; Grow Food System 2026</p>
  </body>
</html>
