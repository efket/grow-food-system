  <text x="218" y="640" fill="#344137" font-family="Arial, Helvetica, sans-serif" font-size="24">Start around your</text>
  <text x="210" y="672" fill="#344137" font-family="Arial, Helvetica, sans-serif" font-size="24">space, time, and routine.</text>

