  <text x="513" y="590" fill="#102D1B" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Grow</text>
  <text x="494" y="640" fill="#344137" font-family="Arial, Helvetica, sans-serif" font-size="24">Focus on productive</text>
